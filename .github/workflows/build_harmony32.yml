name: Build Harmony32 VESC Express

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 获取仓库代码
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ 安装 Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3️⃣ 手动安装 ESP-IDF v5.1
      - name: Install ESP-IDF manually
        run: |
          git clone --branch v5.1 https://github.com/espressif/esp-idf.git ~/esp/esp-idf
          cd ~/esp/esp-idf
          ./install.sh
          echo "source ~/esp/esp-idf/export.sh" >> $GITHUB_ENV

      # 4️⃣ 安装 Python 依赖（如果有 requirements.txt）
      - name: Install Python requirements
        run: |
          if [ -f main/requirements.txt ]; then pip install -r main/requirements.txt; fi

      # 5️⃣ 编译固件
      - name: Build firmware
        run: |
          source $GITHUB_ENV
          cd main
          idf.py set-target esp32c3
          idf.py build

      # 6️⃣ 上传产物
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vesc_firmware
          path: main/build
