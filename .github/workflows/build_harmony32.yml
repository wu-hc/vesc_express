name: Build Harmony32 VESC Express

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 获取仓库代码
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ 安装 Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3️⃣ 手动安装 ESP-IDF
      - name: Install ESP-IDF manually
        run: |
          git clone --branch v5.1 https://github.com/espressif/esp-idf.git $HOME/esp/esp-idf
          cd $HOME/esp/esp-idf
          ./install.sh
          echo "IDF_PATH=$HOME/esp/esp-idf" >> $GITHUB_ENV

      # 4️⃣ 安装 Python 依赖（如果存在）
      - name: Install Python requirements
        run: |
          if [ -f main/requirements.txt ]; then pip install -r main/requirements.txt; fi

      # 5️⃣ 编译固件
      - name: Build firmware
        run: |
          . $IDF_PATH/export.sh
          cd main
          idf.py set-target esp32c3
          idf.py build

      # 6️⃣ 打包固件成带日期的 zip
      - name: Package firmware
        run: |
          ZIP_NAME="$(date +'%Y%m%d')_Harmony32_vesc.zip"
          cd main/build
          zip -r $ZIP_NAME bootloader.bin vesc_express.bin partition_table.bin
          mv $ZIP_NAME $GITHUB_WORKSPACE/

      # 7️⃣ 上传 zip 文件作为 artifact
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: vesc_firmware
          path: $GITHUB_WORKSPACE/*.zip
