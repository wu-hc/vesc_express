name: Build Harmony32 VESC Express

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout 仓库
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ 安装系统 Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3️⃣ 安装 ESP-IDF v5.1
      - name: Install ESP-IDF manually
        run: |
          git clone --branch v5.1 https://github.com/espressif/esp-idf.git $HOME/esp/esp-idf
          cd $HOME/esp/esp-idf
          ./install.sh
          echo "IDF_PATH=$HOME/esp/esp-idf" >> $GITHUB_ENV

      # 4️⃣ 初始化 ESP-IDF 并激活虚拟环境
      - name: Source ESP-IDF and activate venv
        run: |
          . $IDF_PATH/export.sh
          source $HOME/.espressif/python_env/idf5.1_py3.11_env/bin/activate
          python -m pip install --upgrade pip setuptools wheel

      # 5️⃣ 安装仓库 Python 依赖（可选）
      - name: Install repository Python requirements
        run: |
          if [ -f main/requirements.txt ]; then pip install -r main/requirements.txt; fi

      # 6️⃣ 编译固件
      - name: Build firmware
        run: |
          cd main
          idf.py set-target esp32c3
          idf.py build -v

      # 7️⃣ 打包固件成 zip 文件（带日期 + git commit hash）
      - name: Package firmware
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          DATE_STR=$(date +'%Y%m%d')
          ZIP_NAME="${DATE_STR}_Harmony32_${COMMIT_HASH}.zip"
          cd main/build
          zip -r $ZIP_NAME bootloader.bin vesc_express.bin partition_table.bin
          mv $ZIP_NAME $GITHUB_WORKSPACE/

      # 8️⃣ 上传 artifact
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: vesc_firmware
          path: $GITHUB_WORKSPACE/*.zip
