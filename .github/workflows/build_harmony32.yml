name: Build Harmony32 VESC Express

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ESP-IDF manually
        run: |
          git clone --branch v5.1 https://github.com/espressif/esp-idf.git $HOME/esp/esp-idf
          cd $HOME/esp/esp-idf
          ./install.sh esp32c3
          echo "IDF_PATH=$HOME/esp/esp-idf" >> $GITHUB_ENV
          echo "IDF_PY_ENV_PATH=$HOME/.espressif/python_env/idf5.1_py3.11_env" >> $GITHUB_ENV

      - name: Repair ESP-IDF Python environment before export
        run: |
          set -eux
          "$IDF_PY_ENV_PATH/bin/python" -m ensurepip --upgrade || true
          "$IDF_PY_ENV_PATH/bin/python" -m pip install --upgrade pip setuptools wheel
          "$IDF_PY_ENV_PATH/bin/python" -m pip show setuptools
          "$IDF_PY_ENV_PATH/bin/python" -c "import pkg_resources; print(pkg_resources.__file__)"

      - name: Export ESP-IDF
        run: |
          set -eux
          . "$IDF_PATH/export.sh"
          python --version
          which python
          idf.py --version

      - name: Install repository Python requirements
        run: |
          if [ -f main/requirements.txt ]; then
            pip install -r main/requirements.txt
          fi

      - name: Build firmware
        run: |
          set -eux
          . "$IDF_PATH/export.sh"
          cd main
          idf.py set-target esp32c3
          idf.py build -v

      - name: Check expected binaries
        run: |
          set -eux
          test -f main/build/bootloader/bootloader.bin
          test -f main/build/partition_table/partition-table.bin
          test -f main/build/*.bin

      - name: Package firmware
        run: |
          set -eux
          COMMIT_HASH=$(git rev-parse --short HEAD)
          DATE_STR=$(date +'%Y%m%d')
          ZIP_NAME="${DATE_STR}_Harmony32_${COMMIT_HASH}.zip"
          mkdir -p out
          cp main/build/bootloader/bootloader.bin out/
          cp main/build/partition_table/partition-table.bin out/
          find main/build -maxdepth 1 -name "*.bin" -type f -exec cp {} out/ \;
          cd out
          zip -r "../${ZIP_NAME}" ./*
          cd ..
          ls -lh "${ZIP_NAME}"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: vesc_firmware
          path: "*.zip"
