name: Build VBMS32 BMS Firmware

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build_harmony32.yml'

jobs:
  build-vbms32:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest vesc_express
        uses: actions/checkout@v4
        with:
          repository: vedderb/vesc_express
          ref: main
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ESP-IDF v5.5.4
        shell: bash
        run: |
          set -euxo pipefail
          git clone --branch v5.5.4 --recursive https://github.com/espressif/esp-idf.git "$HOME/esp/esp-idf-v5.5.4"
          "$HOME/esp/esp-idf-v5.5.4/install.sh" esp32c3

      - name: Build VBMS32 firmware
        shell: bash
        run: |
          set -euxo pipefail
          . "$HOME/esp/esp-idf-v5.5.4/export.sh"
          idf.py -B build -DIDF_TARGET=esp32c3 -DHW_NAME=VBMS32 build

      - name: Package firmware
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p out/VBMS32
          cp build/vesc_express.bin out/VBMS32/
          cp build/bootloader/bootloader.bin out/VBMS32/
          cp build/partition_table/partition-table.bin out/VBMS32/
          git rev-parse --short HEAD > out/VBMS32/source_commit.txt
          cd out
          zip -r ../VBMS32-firmware.zip VBMS32
          cd ..
          ls -lh VBMS32-firmware.zip out/VBMS32

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: VBMS32-firmware
          path: VBMS32-firmware.zip
