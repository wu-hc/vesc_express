name: Build VESC Harmony32 Firmware

on:
  workflow_dispatch:  # 可以手动触发
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 检出仓库
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ 安装 STM32 工具链 + CMake + Ninja
      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-none-eabi cmake ninja-build make

      # 3️⃣ 设置硬件配置
      - name: Set hardware configuration
        run: |
          cp -r main/hwconf/vesc/vbms32 main/hwconf/current

      # 4️⃣ 构建固件（STM32 + CMake）
      - name: Build firmware with CMake
        run: |
          cd main
          mkdir -p build
          cd build
          # 直接指定交叉编译器
          cmake .. -DCMAKE_C_COMPILER=arm-none-eabi-gcc -DCMAKE_CXX_COMPILER=arm-none-eabi-g++ -G Ninja
          cmake --build . --config Release --verbose

      # 5️⃣ 上传构建产物
      - name: Upload firmware binaries
        uses: actions/upload-artifact@v4
        with:
          name: vesc_harmony32_firmware
          path: main/build/
