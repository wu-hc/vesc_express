name: Build VESC Harmony32 Firmware

on:
  workflow_dispatch:  # 可以手动触发
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 检出源码
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ 安装 STM32 工具链 + CMake + Ninja
      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-none-eabi cmake ninja-build make

      # 3️⃣ 设置 hwconf
      - name: Set hardware configuration
        run: |
          cp -r main/hwconf/vesc/vbms32 main/hwconf/current

      # 4️⃣ 构建固件
      - name: Build firmware with CMake
        run: |
          cd main
          mkdir -p build
          cd build
          # 如果仓库里有 STM32 toolchain 文件可以指定
          if [ -f ../toolchain/stm32_toolchain.cmake ]; then
            cmake .. -DCMAKE_TOOLCHAIN_FILE=../toolchain/stm32_toolchain.cmake -G Ninja
          else
            cmake .. -G Ninja
          fi
          cmake --build . --config Release

      # 5️⃣ 上传生成的 binaries
      - name: Upload firmware binaries
        uses: actions/upload-artifact@v4
        with:
          name: vesc_harmony32_firmware
          path: main/build/
