name: Build Harmony32 VESC Express

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up system Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install ESP-IDF v5.1
        run: |
          git clone --branch v5.1 https://github.com/espressif/esp-idf.git $HOME/esp/esp-idf
          cd $HOME/esp/esp-idf
          ./install.sh
          echo "IDF_PATH=$HOME/esp/esp-idf" >> $GITHUB_ENV

      # ✅ 核心修改：先初始化 ESP-IDF，再升级虚拟环境 pip/setuptools/wheel
      - name: Initialize ESP-IDF and upgrade venv pip/setuptools/wheel
        run: |
          # 初始化 ESP-IDF
          . $IDF_PATH/export.sh
          # ESP-IDF 自带虚拟环境路径
          ESP_PYTHON_ENV="$HOME/.espressif/python_env/idf5.1_py3.11_env"
          # 升级虚拟环境里的 pip/setuptools/wheel
          $ESP_PYTHON_ENV/bin/python -m pip install --upgrade pip setuptools wheel

      - name: Install repository Python requirements
        run: |
          if [ -f main/requirements.txt ]; then pip install -r main/requirements.txt; fi

      - name: Build firmware
        run: |
          cd main
          idf.py set-target esp32c3
          idf.py build -v

      - name: Package firmware
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          DATE_STR=$(date +'%Y%m%d')
          ZIP_NAME="${DATE_STR}_Harmony32_${COMMIT_HASH}.zip"
          cd main/build
          zip -r $ZIP_NAME bootloader.bin vesc_express.bin partition_table.bin
          mv $ZIP_NAME $GITHUB_WORKSPACE/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vesc_firmware
          path: $GITHUB_WORKSPACE/*.zip
