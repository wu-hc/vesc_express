name: ESP32 Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install ESP-IDF
        uses: espressif/setup-esp-idf@v2
        with:
          version: v5.1
      - name: Build firmware
        run: |
          cd main
          idf.py build
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: vesc_firmware
          path: main/build
