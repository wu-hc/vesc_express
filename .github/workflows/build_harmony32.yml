name: Build VESC Harmony32 Firmware

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install STM32 toolchain
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-none-eabi make

      - name: Set hwconf
        run: |
          cp -r main/hwconf/vesc/vbms32 main/hwconf/current

      - name: Build firmware
        run: |
          cd main
          make
          # 或者 ./build.sh，如果源码自带脚本

      - name: Upload firmware binaries
        uses: actions/upload-artifact@v4
        with:
          name: vesc_harmony32_firmware
          path: main/build/
